<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Countries in the World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #eaf1ff;
  }
  #globe { position: fixed; inset: 0; display: block; }
  #vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,10,0.55) 100%);
  }
  .hidden { display: none !important; }

  /* --- overlays (menu / done) --- */
  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; text-align: center;
    background: rgba(3, 7, 18, 0.18);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  .overlay h1 {
    font-size: clamp(38px, 7vw, 64px); font-weight: 800; letter-spacing: 0.03em;
    text-shadow: 0 4px 30px rgba(80, 150, 255, 0.45);
  }
  .overlay p { font-size: 17px; color: #b9c8e8; max-width: 520px; line-height: 1.5; }
  .overlay .credit { font-size: 12px; color: #66739c; margin-top: 12px; }
  .overlay button {
    font: inherit; font-size: 19px; font-weight: 700; letter-spacing: 0.06em;
    padding: 15px 52px; border: none; border-radius: 999px; cursor: pointer;
    color: #eef4ff; background: linear-gradient(180deg, #465f99, #27385f);
    box-shadow: 0 6px 30px rgba(46, 72, 130, 0.42);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .overlay button:hover:enabled { transform: scale(1.05); box-shadow: 0 8px 40px rgba(72, 111, 190, 0.55); }
  .overlay button:disabled { opacity: 0.45; cursor: default; }
  .mode-switch {
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    color: #b9c8e8; font-size: 15px; font-weight: 700; letter-spacing: 0.04em;
  }
  .mode-switch input {
    position: absolute; inline-size: 1px; block-size: 1px; opacity: 0;
  }
  .switch-track {
    position: relative; inline-size: 48px; block-size: 27px; border-radius: 999px;
    background: rgba(80, 104, 150, 0.65); border: 1px solid rgba(150, 180, 255, 0.3);
    transition: background 0.2s, border-color 0.2s;
  }
  .switch-track::after {
    content: ''; position: absolute; inset: 3px auto 3px 3px; inline-size: 19px;
    border-radius: 50%; background: #eaf1ff; transition: transform 0.2s;
  }
  .mode-switch input:checked + .switch-track {
    background: #3f5790; border-color: #7c9fe7;
  }
  .mode-switch input:checked + .switch-track::after { transform: translateX(21px); }
  .mode-switch input:focus-visible + .switch-track { outline: 2px solid #9db9ff; outline-offset: 3px; }
  .mode-switch:has(input:disabled) { opacity: 0.45; cursor: default; }

  /* --- HUD --- */
  .chip {
    position: fixed; top: 18px; z-index: 5;
    padding: 9px 16px; border-radius: 999px;
    font-size: 15px; font-weight: 700; letter-spacing: 0.05em;
    color: #dfe9ff; background: rgba(10, 18, 38, 0.6);
    border: 1px solid rgba(120, 160, 255, 0.18);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    font-variant-numeric: tabular-nums;
  }
  #progress { left: 18px; }
  #timer { right: 18px; }

  #prompt {
    position: fixed; top: 7vh; left: 0; right: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    pointer-events: none;
  }
  #countryName {
    font-size: clamp(28px, 4.6vw, 46px); font-weight: 800; letter-spacing: 0.02em;
    text-align: center; padding: 0 20px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.85), 0 0 40px rgba(90, 160, 255, 0.35);
  }
  #answer {
    pointer-events: auto;
    font: inherit; font-size: 19px; text-align: center;
    width: min(400px, 84vw); padding: 13px 18px;
    color: #f2f6ff; background: rgba(8, 15, 32, 0.72);
    border: 1.5px solid rgba(130, 170, 255, 0.35); border-radius: 14px;
    outline: none; caret-color: #ffd75e;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #answer:focus { border-color: rgba(255, 215, 94, 0.75); box-shadow: 0 0 24px rgba(255, 215, 94, 0.18); }
  #answer.good { border-color: #55e88f; box-shadow: 0 0 30px rgba(85, 232, 143, 0.45); }
  #answer.bad  { border-color: #ff5d6c; box-shadow: 0 0 30px rgba(255, 93, 108, 0.4); animation: shake 0.32s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-9px); } 40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); } 80% { transform: translateX(4px); }
  }
  #hint { font-size: 13px; color: #8fa0c8; letter-spacing: 0.04em; }
</style>
</head>
<body>
<canvas id="globe"></canvas>
<div id="vignette"></div>

<div id="hud" class="hidden">
  <div id="progress" class="chip">0 / 0</div>
  <div id="timer" class="chip">0:00</div>
  <div id="prompt">
    <div id="countryName"></div>
    <input id="answer" type="text" autocomplete="off" autocapitalize="off" autocorrect="off"
           spellcheck="false" placeholder="Type the country's name…">
    <div id="hint">press Enter ↵</div>
  </div>
</div>

<div id="menu" class="overlay">
  <h1></h1>
  <p id="menuSub">Loading Earth…</p>
  <label class="mode-switch" for="infiniteMode">
    <span>Infinite mode</span>
    <input id="infiniteMode" type="checkbox" disabled>
    <span class="switch-track" aria-hidden="true"></span>
  </label>
  <button id="startBtn" disabled>Start</button>
  <p class="credit">Imagery: NASA Blue Marble + Black Marble &nbsp;·&nbsp; Boundaries: Natural Earth</p>
</div>

<div id="done" class="overlay hidden">
  <h1>World Conquered!</h1>
  <p id="doneStats"></p>
  <button id="againBtn">Play again</button>
</div>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script>
(() => {
'use strict';

// ---------------------------------------------------------------- game list
// Natural Earth territories / non-countries excluded from the game
// (they still get faint borders on the globe).
const EXCLUDE = new Set([
  'American Samoa', 'Anguilla', 'Antarctica', 'Aruba', 'Ashmore and Cartier Is.',
  'Bermuda', 'Br. Indian Ocean Ter.', 'British Virgin Is.', 'Cayman Is.',
  'Cook Is.', 'Curaçao', 'Faeroe Is.', 'Falkland Is.', 'Fr. Polynesia',
  'Fr. S. Antarctic Lands', 'Greenland', 'Guam', 'Guernsey',
  'Heard I. and McDonald Is.', 'Hong Kong', 'Indian Ocean Ter.', 'Isle of Man',
  'Jersey', 'Macao', 'Montserrat', 'N. Cyprus', 'N. Mariana Is.',
  'New Caledonia', 'Niue', 'Norfolk Island', 'Pitcairn Is.', 'Puerto Rico',
  'S. Geo. and the Is.', 'Saint Helena', 'Siachen Glacier', 'Sint Maarten',
  'Somaliland', 'St-Barthélemy', 'St-Martin', 'St. Pierre and Miquelon',
  'Turks and Caicos Is.', 'U.S. Virgin Is.', 'W. Sahara', 'Wallis and Futuna Is.',
  'Åland',
]);
// Natural Earth abbreviations → full names
const RENAME = {
  'Antigua and Barb.': 'Antigua and Barbuda',
  'Bosnia and Herz.': 'Bosnia and Herzegovina',
  'Central African Rep.': 'Central African Republic',
  'Congo': 'Republic of the Congo',
  'Dem. Rep. Congo': 'Democratic Republic of the Congo',
  'Dominican Rep.': 'Dominican Republic',
  'Eq. Guinea': 'Equatorial Guinea',
  'Macedonia': 'North Macedonia',
  'Marshall Is.': 'Marshall Islands',
  'S. Sudan': 'South Sudan',
  'Solomon Is.': 'Solomon Islands',
  'St. Kitts and Nevis': 'Saint Kitts and Nevis',
  'St. Vin. and Gren.': 'Saint Vincent and the Grenadines',
  'São Tomé and Principe': 'São Tomé and Príncipe',
  'United States of America': 'United States',
  'Vatican': 'Vatican City',
  'eSwatini': 'Eswatini',
};

const DATA_URL = 'https://unpkg.com/world-atlas@2.0.2/countries-50m.json';
const IMG = 'https://unpkg.com/three-globe/example/img/';

// ---------------------------------------------------------------- three.js
const canvas = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

const DAY_MAP_URL = renderer.capabilities.maxTextureSize >= 8192
  ? 'assets/earth-day-8k.jpg'
  : IMG + 'earth-blue-marble.jpg';
const NIGHT_MAP_URL = 'assets/earth-night.jpg';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 200);

// Earth illumination is calculated per pixel from the real solar position.
// Do not add ambient scene light: it would brighten the night hemisphere.

// star field
{
  const mkStars = (n, size, spread) => {
    const pos = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
      const v = new THREE.Vector3().randomDirection().multiplyScalar(45 + Math.random() * spread);
      pos.set([v.x, v.y, v.z], i * 3);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    return new THREE.Points(g, new THREE.PointsMaterial({
      color: 0xcdd9ff, size, sizeAttenuation: true,
      transparent: true, opacity: 0.85, depthWrite: false,
    }));
  };
  scene.add(mkStars(3500, 0.09, 30));
  scene.add(mkStars(250, 0.22, 30));
}

// atmosphere: inner rim light + outer halo
const atmosphereMaterials = [];
const fresnelMat = (color, frag, side, blendScale) => {
  const material = new THREE.ShaderMaterial({
  uniforms: { c: { value: new THREE.Color(color) }, sunDirection: { value: new THREE.Vector3(1, 0, 0) } },
  vertexShader: `
    varying vec3 vN; varying vec3 vObjectN;
    void main() {
      vN = normalize(normalMatrix * normal);
      vObjectN = normalize(normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    uniform vec3 c; uniform vec3 sunDirection; varying vec3 vN; varying vec3 vObjectN;
    void main() {
      ${frag}
      float daylight = 0.24 + 0.76 * max(dot(normalize(vObjectN), normalize(sunDirection)), 0.0);
      gl_FragColor = vec4(c * f * daylight * ${blendScale}, 1.0);
    }`,
  blending: THREE.AdditiveBlending, transparent: true, depthWrite: false, side,
  });
  atmosphereMaterials.push(material);
  return material;
};
{
  const rim = new THREE.Mesh(
    new THREE.SphereGeometry(1.001, 64, 64),
    fresnelMat(0x7fb8ff, 'float f = pow(1.0 - max(dot(vN, vec3(0.,0.,1.)), 0.0), 4.5);', THREE.FrontSide, '0.55')
  );
  const halo = new THREE.Mesh(
    new THREE.SphereGeometry(1.16, 64, 64),
    fresnelMat(0x4f9fe8, 'float f = pow(max(-dot(vN, vec3(0.,0.,1.)), 0.0), 1.6);', THREE.BackSide, '1.3')
  );
  scene.add(rim, halo);
}

// ---------------------------------------------------------------- geo utils
function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;   // polar angle from +y
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

// NOAA's solar-position approximation, expressed in the globe's longitude
// coordinate system. It accounts for both Earth's axial tilt and the equation
// of time, so the terminator follows the actual UTC date and time.
function solarDirectionAt(date) {
  const yearStart = Date.UTC(date.getUTCFullYear(), 0, 1);
  const day = Math.floor((date.getTime() - yearStart) / 86400000) + 1;
  const minutes = date.getUTCHours() * 60 + date.getUTCMinutes()
    + date.getUTCSeconds() / 60 + date.getUTCMilliseconds() / 60000;
  const gamma = 2 * Math.PI / 365 * (day - 1 + (minutes - 720) / 1440);
  const equationOfTime = 229.18 * (0.000075 + 0.001868 * Math.cos(gamma)
    - 0.032077 * Math.sin(gamma) - 0.014615 * Math.cos(2 * gamma)
    - 0.040849 * Math.sin(2 * gamma));
  const declination = 0.006918 - 0.399912 * Math.cos(gamma)
    + 0.070257 * Math.sin(gamma) - 0.006758 * Math.cos(2 * gamma)
    + 0.000907 * Math.sin(2 * gamma) - 0.002697 * Math.cos(3 * gamma)
    + 0.00148 * Math.sin(3 * gamma);
  const subsolarLongitude = (720 - minutes - equationOfTime) / 4;
  return latLonToVec3(THREE.MathUtils.radToDeg(declination), subsolarLongitude, 1).normalize();
}

function createEarthMaterial(dayMap, nightMap, waterMap) {
  return new THREE.ShaderMaterial({
    uniforms: {
      dayMap: { value: dayMap }, nightMap: { value: nightMap }, waterMap: { value: waterMap },
      sunDirection: { value: solarDirectionAt(new Date()) }, gameDim: { value: 1 },
      // Kept as uniforms so the night look can be art-directed without
      // touching the solar model or adding a post-processing pass.
      cityLightIntensity: { value: 1.85 },
      cityLightThreshold: { value: 0.025 },
      cityLightSoftness: { value: 0.085 },
      cityLightDuskFade: { value: 0.07 },
    },
    vertexShader: `
      varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorldPosition;
      void main() {
        vUv = uv; vNormal = normalize(normal);
        vWorldPosition = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform sampler2D dayMap; uniform sampler2D nightMap; uniform sampler2D waterMap;
      uniform vec3 sunDirection; uniform float gameDim;
      uniform float cityLightIntensity; uniform float cityLightThreshold;
      uniform float cityLightSoftness; uniform float cityLightDuskFade;
      varying vec2 vUv; varying vec3 vNormal; varying vec3 vWorldPosition;
      float nightLightAt(vec2 uv) {
        vec3 sampleColor = pow(texture2D(nightMap, uv).rgb, vec3(2.2));
        return max(max(sampleColor.r, sampleColor.g), sampleColor.b);
      }
      void main() {
        vec3 n = normalize(vNormal);
        vec3 l = normalize(sunDirection);
        vec3 v = normalize(cameraPosition - vWorldPosition);
        float nl = dot(n, l);
        float sunlit = smoothstep(-0.04, 0.16, nl);
        // ShaderMaterial does not receive the built-in texture color-space
        // decode chunks, so convert the sRGB JPEG samples to linear light.
        vec3 day = pow(texture2D(dayMap, vUv).rgb, vec3(2.2));
        vec3 nightTexture = pow(texture2D(nightMap, vUv).rgb, vec3(2.2));
        // Keep the actual Earth surface readable after sunset. City lights
        // are deliberately separated below, instead of brightening the whole
        // Black Marble map and making deserts or coastlines glow.
        vec3 nightSurface = day * 0.065 + vec3(0.002, 0.006, 0.014);
        vec3 daySurface = day * (0.14 + 0.86 * max(nl, 0.0));
        vec3 color = mix(nightSurface, daySurface, sunlit);

        // Black Marble is a measured night-light image. A soft high-pass mask
        // extracts the dense urban signal, while a small local average gives
        // it a restrained atmospheric halo without a global bloom filter.
        float citySignal = max(max(nightTexture.r, nightTexture.g), nightTexture.b);
        float cityCore = smoothstep(cityLightThreshold,
          cityLightThreshold + cityLightSoftness, citySignal);
        vec2 texel = vec2(1.0 / 4096.0, 1.0 / 2048.0);
        float cityNear = 0.0;
        cityNear += nightLightAt(vUv + vec2(texel.x * 2.0, 0.0));
        cityNear += nightLightAt(vUv - vec2(texel.x * 2.0, 0.0));
        cityNear += nightLightAt(vUv + vec2(0.0, texel.y * 2.0));
        cityNear += nightLightAt(vUv - vec2(0.0, texel.y * 2.0));
        float cityHalo = smoothstep(cityLightThreshold * 0.65,
          cityLightThreshold + cityLightSoftness, cityNear * 0.25);
        float nightAmount = 1.0 - smoothstep(-0.18, cityLightDuskFade, nl);
        float viewFacing = smoothstep(0.035, 0.32, dot(n, v));
        vec3 cityColor = mix(vec3(0.30, 0.48, 1.0), vec3(1.0, 0.48, 0.10), cityCore);
        color += cityColor * cityCore * cityLightIntensity * nightAmount * viewFacing;
        color += vec3(0.16, 0.28, 0.62) * cityHalo * 0.20 * nightAmount * viewFacing;
        float water = texture2D(waterMap, vUv).r;
        vec3 reflected = reflect(-l, n);
        float glint = pow(max(dot(reflected, v), 0.0), 72.0) * water * sunlit;
        color += vec3(0.50, 0.62, 0.72) * glint * 0.38;
        gl_FragColor = vec4(pow(color * gameDim, vec3(1.0 / 2.2)), 1.0);
      }`,
  });
}

function createCloudMaterial(cloudMap) {
  return new THREE.ShaderMaterial({
    uniforms: { cloudMap: { value: cloudMap }, sunDirection: { value: solarDirectionAt(new Date()) } },
    vertexShader: `
      varying vec2 vUv; varying vec3 vNormalW;
      void main() {
        vUv = uv;
        vNormalW = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      uniform sampler2D cloudMap; uniform vec3 sunDirection;
      varying vec2 vUv; varying vec3 vNormalW;
      void main() {
        vec4 cloud = texture2D(cloudMap, vUv);
        float sunlight = smoothstep(-0.12, 0.18, dot(normalize(vNormalW), normalize(sunDirection)));
        float shade = 0.28 + 0.72 * max(dot(normalize(vNormalW), normalize(sunDirection)), 0.0);
        gl_FragColor = vec4(vec3(shade), cloud.a * sunlight * 0.62);
      }`,
    transparent: true, depthWrite: false,
  });
}

function ringToSegments(ring, r, out) {
  let px, py, pz, has = false;
  for (const [lon, lat] of ring) {
    const v = latLonToVec3(lat, lon, r);
    if (has) out.push(px, py, pz, v.x, v.y, v.z);
    px = v.x; py = v.y; pz = v.z; has = true;
  }
}

function lineSegmentsFrom(arr, color, opacity) {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(arr, 3));
  return new THREE.LineSegments(g, new THREE.LineBasicMaterial({
    color, transparent: true, opacity, depthWrite: false,
  }));
}

function tubeFromPoints(points, radius, color, opacity, renderOrder) {
  const clean = points.slice();
  if (clean.length > 1 && clean[0].distanceToSquared(clean[clean.length - 1]) < 1e-10) clean.pop();
  if (clean.length < 3) return null;
  const curve = new THREE.CatmullRomCurve3(clean, true, 'centripetal');
  const geometry = new THREE.TubeGeometry(curve, clean.length, radius, 5, true);
  const material = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity, depthWrite: false, side: THREE.DoubleSide,
  });
  const tube = new THREE.Mesh(geometry, material);
  tube.renderOrder = renderOrder;
  return tube;
}

function tubeFromRing(ring, surfaceRadius, radius, color, opacity, renderOrder) {
  return tubeFromPoints(
    ring.map(([lon, lat]) => latLonToVec3(lat, lon, surfaceRadius)),
    radius, color, opacity, renderOrder
  );
}

function slerpDir(a, b, t) {
  const omega = Math.acos(THREE.MathUtils.clamp(a.dot(b), -1, 1));
  const so = Math.sin(omega);
  if (so < 1e-6) return a.clone();
  return a.clone().multiplyScalar(Math.sin((1 - t) * omega) / so)
          .addScaledVector(b, Math.sin(t * omega) / so).normalize();
}

function planAdjacentRoute(nodes) {
  const owners = new Map();
  nodes.forEach((country, index) => {
    country.neighbors = new Set();
    for (const arcId of country.arcIds) {
      if (!owners.has(arcId)) owners.set(arcId, []);
      owners.get(arcId).push(index);
    }
  });
  for (const indexes of owners.values()) {
    for (let i = 0; i < indexes.length; i++) {
      for (let j = i + 1; j < indexes.length; j++) {
        nodes[indexes[i]].neighbors.add(indexes[j]);
        nodes[indexes[j]].neighbors.add(indexes[i]);
      }
    }
  }

  // Stable pseudo-randomness keeps the resulting route identical on every playthrough.
  let seed = 0x6d2b79f5;
  const random = () => {
    seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
  const edge = (a, b) => nodes[a].neighbors.has(b);
  const jumpDistance = (a, b) => nodes[a].center.angleTo(nodes[b].center);
  const edgeCost = (a, b) => edge(a, b) ? 0 : 1 + jumpDistance(a, b) * 0.001;
  const score = route => route.reduce((total, country, index) =>
    index ? total + edgeCost(route[index - 1], country) : total, 0);

  const buildCandidate = () => {
    const unvisited = new Set(nodes.map((_, index) => index));
    const route = [];
    let current = Math.floor(random() * nodes.length);
    while (unvisited.size) {
      if (!unvisited.has(current)) current = [...unvisited][Math.floor(random() * unvisited.size)];
      route.push(current);
      unvisited.delete(current);
      const adjacent = [...nodes[current].neighbors].filter(index => unvisited.has(index));
      if (adjacent.length) {
        // Visit constrained countries first so they are less likely to become
        // stranded and force an unnecessary bridge later.
        adjacent.sort((a, b) => {
          const aOptions = [...nodes[a].neighbors].filter(index => unvisited.has(index)).length;
          const bOptions = [...nodes[b].neighbors].filter(index => unvisited.has(index)).length;
          return aOptions - bOptions || random() - 0.5;
        });
        current = adjacent[0];
      } else if (unvisited.size) {
        const nearby = [...unvisited].sort((a, b) => jumpDistance(current, a) - jumpDistance(current, b));
        current = nearby[Math.floor(random() * Math.min(4, nearby.length))];
      }
    }
    return route;
  };

  const improve = route => {
    let bestScore = score(route);
    let changed = true;
    for (let pass = 0; changed && pass < 8; pass++) {
      changed = false;
      for (let i = 0; i < route.length - 3; i++) {
        for (let j = i + 1; j < route.length - 1; j++) {
          const before = edgeCost(route[i], route[i + 1]) + edgeCost(route[j], route[j + 1]);
          const after = edgeCost(route[i], route[j]) + edgeCost(route[i + 1], route[j + 1]);
          if (after + 1e-9 < before) {
            const middle = route.slice(i + 1, j + 1).reverse();
            route.splice(i + 1, middle.length, ...middle);
            bestScore += after - before;
            changed = true;
          }
        }
      }
    }
    return { route, score: bestScore };
  };

  let best = null;
  for (let attempt = 0; attempt < 96; attempt++) {
    const candidate = improve(buildCandidate());
    if (!best || candidate.score < best.score) best = candidate;
  }
  return best.route;
}

function planClosedAdjacentRoute(nodes) {
  const edge = (a, b) => nodes[a].neighbors.has(b);
  const jumpDistance = (a, b) => nodes[a].center.angleTo(nodes[b].center);
  const edgeCost = (a, b) => edge(a, b) ? 0 : 1 + jumpDistance(a, b) * 0.001;
  const score = route => route.reduce((total, country, index) =>
    total + edgeCost(country, route[(index + 1) % route.length]), 0);

  let seed = 0x34f91c2b;
  const random = () => {
    seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };

  const buildCandidate = () => {
    const unvisited = new Set(nodes.map((_, index) => index));
    const route = [];
    let current = Math.floor(random() * nodes.length);
    while (unvisited.size) {
      route.push(current);
      unvisited.delete(current);
      if (!unvisited.size) break;

      const adjacent = [...nodes[current].neighbors].filter(index => unvisited.has(index));
      if (adjacent.length) {
        adjacent.sort((a, b) => {
          const aOptions = [...nodes[a].neighbors].filter(index => unvisited.has(index)).length;
          const bOptions = [...nodes[b].neighbors].filter(index => unvisited.has(index)).length;
          return aOptions - bOptions || random() - 0.5;
        });
        current = adjacent[0];
      } else {
        const nearby = [...unvisited].sort((a, b) => jumpDistance(current, a) - jumpDistance(current, b));
        current = nearby[Math.floor(random() * Math.min(4, nearby.length))];
      }
    }
    return route;
  };

  const improve = route => {
    let changed = true;
    for (let pass = 0; changed && pass < 8; pass++) {
      changed = false;
      // 2-opt on a cycle: the second edge may be the route's closing edge.
      for (let i = 0; i < route.length - 2; i++) {
        for (let j = i + 2; j < route.length; j++) {
          if (i === 0 && j === route.length - 1) continue;
          const a = route[i], b = route[i + 1];
          const c = route[j], d = route[(j + 1) % route.length];
          const before = edgeCost(a, b) + edgeCost(c, d);
          const after = edgeCost(a, c) + edgeCost(b, d);
          if (after + 1e-9 < before) {
            const middle = route.slice(i + 1, j + 1).reverse();
            route.splice(i + 1, middle.length, ...middle);
            changed = true;
          }
        }
      }
    }
    return { route, score: score(route) };
  };

  let best = null;
  for (let attempt = 0; attempt < 96; attempt++) {
    const candidate = improve(buildCandidate());
    if (!best || candidate.score < best.score) best = candidate;
  }
  return best.route;
}


// ---------------------------------------------------------------- load
const $ = id => document.getElementById(id);
const ui = {
  hud: $('hud'), menu: $('menu'), done: $('done'), menuSub: $('menuSub'),
  startBtn: $('startBtn'), againBtn: $('againBtn'), doneStats: $('doneStats'),
  infiniteMode: $('infiniteMode'),
  countryName: $('countryName'), answer: $('answer'),
  progress: $('progress'), timer: $('timer'),
};

let countries = [];          // {name, polys, center, angR, arcIds}
let plannedRoute = [];       // country indexes; a no-repeat, adjacent-first route
let plannedEndlessRoute = []; // country indexes; a no-repeat, adjacent-first cycle
let earthMaterial = null;
let cloudMaterial = null, cloudLayer = null;

// Deliberately curated from how the highlight reads in play, rather than from
// a single geometry threshold. These countries need a visible fallback marker.
const SPOTLIGHT_COUNTRIES = new Set([
  'Andorra', 'Antigua and Barbuda', 'Bahrain', 'Barbados', 'Dominica',
  'Grenada', 'Liechtenstein', 'Maldives', 'Malta', 'Mauritius', 'Monaco',
  'Nauru', 'Saint Kitts and Nevis', 'Saint Lucia',
  'Saint Vincent and the Grenadines', 'San Marino', 'Seychelles',
  'Singapore', 'Vatican City',
]);
const highlight = new THREE.Group();
scene.add(highlight);

const texLoader = new THREE.TextureLoader();
const loadTex = url => texLoader.loadAsync(url).then(t => {
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return t;
});

Promise.all([
  loadTex(DAY_MAP_URL),
  loadTex(NIGHT_MAP_URL),
  loadTex('assets/earth-clouds.png'),
  loadTex(IMG + 'earth-water.png'),
  fetch(DATA_URL).then(r => { if (!r.ok) throw new Error('data ' + r.status); return r.json(); }),
]).then(([colorMap, nightMap, cloudMap, waterMap, topo]) => {
  earthMaterial = createEarthMaterial(colorMap, nightMap, waterMap);
  const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 96, 96), earthMaterial);
  scene.add(earth);
  cloudMaterial = createCloudMaterial(cloudMap);
  cloudLayer = new THREE.Mesh(new THREE.SphereGeometry(1.008, 96, 96), cloudMaterial);
  scene.add(cloudLayer);

  // build country records + one faint border layer for every feature
  const features = topojson.feature(topo, topo.objects.countries).features;
  const borderArr = [];
  for (let featureIndex = 0; featureIndex < features.length; featureIndex++) {
    const f = features[featureIndex];
    if (!f.geometry) continue;
    const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates]
                : f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates : [];
    for (const poly of polys) for (const ring of poly) ringToSegments(ring, 1.0012, borderArr);

    const raw = f.properties.name;
    if (EXCLUDE.has(raw)) continue;

    // frame on the largest outer ring; include nearby rings, ignore far overseas bits
    const outers = polys.map(p => p[0]);
    const largest = outers.reduce((a, b) => (b.length > a.length ? b : a), outers[0]);
    const center = new THREE.Vector3();
    for (const [lon, lat] of largest) center.add(latLonToVec3(lat, lon, 1));
    center.normalize();
    let angR = 0.003;
    for (const ring of outers) {
      const isMain = ring === largest;
      for (const [lon, lat] of ring) {
        const a = center.angleTo(latLonToVec3(lat, lon, 1));
        if (isMain || a < 0.5) angR = Math.max(angR, a);
      }
    }
    // TopoJSON represents a shared border with the same arc ID in both
    // countries. Keep those IDs so the game can build its border graph.
    const arcIds = new Set();
    const addArcIds = arcs => {
      if (Array.isArray(arcs)) arcs.forEach(addArcIds);
      else if (Number.isInteger(arcs)) arcIds.add(arcs < 0 ? ~arcs : arcs);
    };
    addArcIds(topo.objects.countries.geometries[featureIndex].arcs);
    countries.push({ name: RENAME[raw] || raw, polys, center, angR, arcIds });
  }
  plannedRoute = planAdjacentRoute(countries);
  plannedEndlessRoute = planClosedAdjacentRoute(countries);
  scene.add(lineSegmentsFrom(borderArr, 0x5c7ea8, 0.3));
  console.log(`Country Typer: ${countries.length} countries in play`);

  ui.menuSub.textContent = `${countries.length} countries. One globe. Type each name to claim it.`;
  ui.infiniteMode.disabled = false;
  ui.startBtn.disabled = false;
}).catch(err => {
  console.error(err);
  ui.menuSub.textContent = '⚠ Could not load Earth data — check your internet connection and reload.';
});

// ---------------------------------------------------------------- camera
const view = { dir: latLonToVec3(18, 10, 1), dist: 3.4 };
let flight = null;

function flyTo(country) {
  const toDist = 1 + THREE.MathUtils.clamp(country.angR * 3.4, 0.30, 2.3);
  const ang = view.dir.angleTo(country.center);
  flight = {
    fromDir: view.dir.clone(), toDir: country.center.clone(),
    fromDist: view.dist, toDist,
    t0: performance.now(), dur: (0.85 + ang * 0.55) * 1000,
    bump: Math.min(0.55, ang * 0.5),
  };
}

// ---------------------------------------------------------------- highlight
function setHighlight(country) {
  for (const child of highlight.children) {
    child.geometry.dispose();
    child.material.dispose();
  }
  highlight.clear();
  if (!country) return;

  // WebGL's basic lines are usually locked to one pixel. These two static tube
  // outlines stay visible at close zoom without the distracting pulse animation.
  for (const poly of country.polys) {
    const halo = tubeFromRing(poly[0], 1.007, 0.0018, 0xffd75e, 0.30, 1);
    const contour = tubeFromRing(poly[0], 1.008, 0.0006, 0xfff3c4, 1, 2);
    if (halo) highlight.add(halo);
    if (contour) highlight.add(contour);
  }

  if (SPOTLIGHT_COUNTRIES.has(country.name)) {
    const c = country.center, aR = Math.max(country.angR * 3, 0.03);
    let t1 = new THREE.Vector3(0, 1, 0).cross(c);
    if (t1.lengthSq() < 1e-6) t1.set(1, 0, 0); else t1.normalize();
    const t2 = c.clone().cross(t1).normalize();
    const pts = [];
    for (let i = 0; i <= 96; i++) {
      const th = (i / 96) * Math.PI * 2;
      pts.push(c.clone().multiplyScalar(Math.cos(aR))
        .addScaledVector(t1, Math.cos(th) * Math.sin(aR))
        .addScaledVector(t2, Math.sin(th) * Math.sin(aR))
        .multiplyScalar(1.008));
    }
    const halo = tubeFromPoints(pts, 0.0018, 0xffd75e, 0.30, 1);
    const contour = tubeFromPoints(pts, 0.0006, 0xfff3c4, 1, 2);
    if (halo) highlight.add(halo);
    if (contour) highlight.add(contour);
  }
}

// ---------------------------------------------------------------- game
const norm = s => s.toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
  .replace(/['’‘`´]/g, '').replace(/[-–—]/g, ' ').replace(/[.,]/g, '')
  .replace(/\s+/g, ' ').trim().replace(/^the /, '');

let phase = 'menu';          // menu | playing | done
let gameMode = 'finite';     // finite | endless
let remaining = [], target = null, doneCount = 0, total = 0, startTime = 0;
let endlessStartIndex = 0;

function setGameMode(mode) {
  gameMode = mode;
  ui.infiniteMode.checked = mode === 'endless';
}

function refillRoute() {
  const route = gameMode === 'endless' ? plannedEndlessRoute : plannedRoute;
  const orderedRoute = gameMode === 'endless'
    ? route.slice(endlessStartIndex).concat(route.slice(0, endlessStartIndex))
    : route;
  // nextCountry() pops, so reverse the planned order for each lap.
  remaining = orderedRoute.slice().reverse().map(index => countries[index]);
}

function startGame() {
  if (gameMode === 'endless') {
    // Rotating a closed route preserves every adjacency and jump transition.
    endlessStartIndex = Math.floor(Math.random() * plannedEndlessRoute.length);
  }
  refillRoute();
  total = remaining.length; doneCount = 0;
  phase = 'playing'; startTime = performance.now();
  earthMaterial.uniforms.gameDim.value = 1;
  ui.menu.classList.add('hidden'); ui.done.classList.add('hidden');
  ui.hud.classList.remove('hidden');
  nextCountry();
}

function nextCountry() {
  target = remaining.pop();
  const displayedCount = gameMode === 'endless' ? doneCount + 1 : doneCount;
  ui.progress.textContent = `${displayedCount} / ${total}`;
  ui.countryName.textContent = target.name;
  ui.answer.value = '';
  ui.answer.focus();
  setHighlight(target);
  flyTo(target);
}

function finish() {
  phase = 'done';
  earthMaterial.uniforms.gameDim.value = 1;
  target = null; setHighlight(null);
  ui.hud.classList.add('hidden');
  ui.done.classList.remove('hidden');
  ui.doneStats.textContent =
    `You typed all ${total} countries in ${fmtTime(performance.now() - startTime)}.`;
  view.dist = 3.4;                          // drift back out for the end screen
  flight = { fromDir: view.dir.clone(), toDir: view.dir.clone(),
             fromDist: view.dist, toDist: 3.4, t0: performance.now(), dur: 1500, bump: 0 };
}

function submit() {
  if (phase !== 'playing' || !target) return;
  if (norm(ui.answer.value) === norm(target.name)) {
    doneCount++;
    flashInput('good');
    if (remaining.length === 0) {
      if (gameMode === 'endless') refillRoute();
      else { ui.progress.textContent = `${doneCount} / ${total}`; finish(); return; }
    }
    nextCountry();
  } else {
    flashInput('bad');
  }
}

let flashTimer = null;
function flashInput(cls) {
  ui.answer.classList.remove('good', 'bad');
  void ui.answer.offsetWidth;               // restart CSS animation
  ui.answer.classList.add(cls);
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => ui.answer.classList.remove('good', 'bad'), 380);
}

const fmtTime = ms => {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
};

ui.infiniteMode.addEventListener('change', () => setGameMode(ui.infiniteMode.checked ? 'endless' : 'finite'));
ui.startBtn.addEventListener('click', startGame);
ui.againBtn.addEventListener('click', startGame);
ui.answer.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
ui.answer.addEventListener('blur', () => {
  if (phase === 'playing') setTimeout(() => ui.answer.focus(), 0);
});

// ---------------------------------------------------------------- loop
const easeInOutCubic = t => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
const yAxis = new THREE.Vector3(0, 1, 0);
let last = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - last) / 1000, 0.1);
  last = now;

  if (phase === 'menu' || phase === 'done') view.dir.applyAxisAngle(yAxis, dt * 0.045);

  if (flight) {
    const t = Math.min((now - flight.t0) / flight.dur, 1);
    const e = easeInOutCubic(t);
    view.dir.copy(slerpDir(flight.fromDir, flight.toDir, e));
    view.dist = THREE.MathUtils.lerp(flight.fromDist, flight.toDist, e)
              + flight.bump * Math.sin(Math.PI * e);
    if (t >= 1) flight = null;
  }

  camera.position.copy(view.dir).multiplyScalar(view.dist);
  camera.lookAt(0, 0, 0);
  camera.updateMatrixWorld();
  const sunDirection = solarDirectionAt(new Date());
  if (earthMaterial) earthMaterial.uniforms.sunDirection.value.copy(sunDirection);
  if (cloudMaterial) cloudMaterial.uniforms.sunDirection.value.copy(sunDirection);
  if (cloudLayer) cloudLayer.rotation.y += dt * 0.0025;
  for (const material of atmosphereMaterials) material.uniforms.sunDirection.value.copy(sunDirection);

  if (phase === 'playing') ui.timer.textContent = fmtTime(now - startTime);
  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

})();
</script>
</body>
</html>
